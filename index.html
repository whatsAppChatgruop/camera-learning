<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camera Learning</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📷 آموزش دوربین</h1>

<p id="status">وضعیت: آماده</p>
<p id="security"></p>
<div id="permissionBox">

<p>
برای استفاده از دوربین، لطفاً اجازه دهید.
</p>

<button onclick="acceptPermission()">
تأیید و ادامه
</button>

</div>
<button onclick="openCamera()">فعال کردن دوربین</button>
<button onclick="stopCamera()">خاموش کردن دوربین</button>
<video id="video" autoplay playsinline></video>

<button onclick="takePhoto()">گرفتن عکس</button>

<canvas id="canvas"></canvas>

<img id="photo">

<button onclick="savePhoto()">ذخیره عکس</button>

</div>


<script src="script.js"></script>

</body>

</html>
