<!DOCTYPE html>
<html>
<head>
    <title>Camera Permission Test</title>
</head>

<body>
    <h1>آزمایش دسترسی دوربین</h1>
    <button onclick="openCamera()">باز کردن دوربین</button>

    <br><br>

    <video id="video" width="320" autoplay></video>

<script>
function openCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream) {
        document.getElementById("video").srcObject = stream;
    })
    .catch(function(error) {
        alert("دسترسی به دوربین داده نشد");
    });
}
</script>

</body>
</html>
